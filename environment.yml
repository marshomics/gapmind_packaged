# Conda environment for the GapMind command-line pipeline (build + analysis).
# Replaces the manual "compile from source / drop this binary in bin/" steps in
# the original SETUP, except for three things the scripts fetch themselves:
# the usearch binary, the PaperBLAST data tarball, and Swissknife.
#
#   conda env create -f environment.yml      # or: mamba env create -f environment.yml
#   conda activate gapmind
#
# Channel order matters: conda-forge first, then bioconda (the bioconda standard).
name: gapmind
channels:
  - conda-forge
  - bioconda
dependencies:
  # interpreters + database engine
  - perl >=5.26
  - sqlite >=3.7

  # sequence search + profile-HMM tools (replace source/FTP downloads)
  - hmmer >=3.3                 # hmmsearch, hmmfetch, hmmpress
  - diamond >=2.1.6            # default Phase 3 search tool (free usearch substitute)
  - blast-legacy =2.2.26      # legacy formatdb, blastall, fastacmd

  # Perl modules the build + analysis scripts need
  - perl-dbi                    # DBI (pulled by perl-dbd-sqlite too)
  - perl-dbd-sqlite             # DBD::SQLite, for all the sqlite databases
  - perl-bioperl                # Bio::SeqIO (buildorgs.pl)
  - perl-libwww-perl            # LWP::UserAgent / LWP::Simple (gapquery UniProt fetch)
  - perl-lwp-protocol-https     # https transport for the above
  - perl-json                   # JSON

  # download / build helpers
  - make
  - git
  - wget
  - curl

# ---------------------------------------------------------------------------
# OPTIONAL: only for the gapView.cgi web viewer (not the command-line pipeline).
# Add these to the dependencies above if you want to serve results over HTTP.
# DB_File is not reliably on bioconda; install it with `cpanm DB_File` (needs the
# BerkeleyDB C library) inside the activated env if the viewer needs it.
#   - perl-cgi
#   - perl-html-parser          # HTML::Entities
#   - perl-io-string            # IO::String
#   - perl-xml-libxml           # XML::LibXML
# ---------------------------------------------------------------------------
